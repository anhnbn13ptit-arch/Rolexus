<!DOCTYPE html> <html>
<head>
    <title>Trang web của nhóm </title> <meta charset="UTF-8">
    <link rel="stylesheet" href="trang_tri.css">
</head>
<body>
    <header class="rolexus-header">
    
        <div class="header-left">
            <button id="open-menu-btn" class="menu-btn">☰ Danh Mục</button>
        
            <a href="#" class="logo">
                <img src="anh/rolexus_logo.jpg" style="width: 80px;" alt="Logo Rolexus">
            </a>
        </div>
    
        <div class="header-icons">
            <button id="search-btn" class="icon-btn">🔍</button>
            <button id="user-btn" class="icon-btn">👤</button>
        </div>
    
    </header>

    <div id="search-bar" class="search-container">
        <input type="text" placeholder="Bạn tìm kiếm gì hôm nay?">
        <button>Tìm</button>
    </div>

    <div id="login-modal" class="modal-overlay">
        <div class="modal-box">
            <span id="close-login-btn" class="close-btn">✖</span>
            <h2>Đăng Nhập</h2>
            <input type="text" placeholder="Tên đăng nhập" class="input-field">
            <input type="password" placeholder="Mật khẩu" class="input-field">
            <button class="submit-btn">Đăng Nhập Ngay</button>
        </div>
    </div>
    
    <div id="menu-overlay"></div>
    <nav id="rolexus-sidebar">
        <button id="close-menu-btn">✖ Đóng</button>
    
        <ul class="menu-list">
            <li><a href="#">Thời trang nam</a></li>
            <li><a href="#">Thời trang nữ</a></li>
            <li><a href="#">Trang sức</a></li>
        </ul>
    </nav>


       

<div id="product-list" class="container">
    
</div>
    <button id="myBtn" class="supercool_style"></button>
    <script src="kich_ban.js"></script>
    </body>
</html>
