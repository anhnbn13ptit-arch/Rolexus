<!DOCTYPE html> <html>
<head>
    <title>Trang web của nhóm </title> <meta charset="UTF-8">
    <link rel="stylesheet" href="trang_tri.css">
</head>
<body>
    <header class="rolexus-header">
    
        <div class="header-left">
            
        
            <a href="#" class="logo">
                <img src="anh/rolexus_logo.jpg" style="width: 80px;" alt="Logo Rolexus">
            </a>
            <button id="open-menu-btn" class="menu-btn">☰ Danh Mục</button>
        </div>
        
        <div id="input_boc">
            <input placeholder="Tìm kiếm sản phẩm" id="input" name="text" type="text">
        </div>
        
        <div class="header-icons">
            
            <button id="search-btn" class="icon-btn"> <img id="anh_search" src="anh/file_he_thong/search.png"></button>
            <button id="cart-btn" class="icon-btn">🛒 <span id="cart-count">0</span></button>
            <button id="user-btn" class="icon-btn">👤</button>
        </div>
    
    </header>

    

    <div id="login-modal" class="modal-overlay">
        <div class="modal-box" id="auth-box">
            <span id="close-login-btn" class="close-btn">✖</span>
            <h2 id="auth-title" style="font-style:italic">Đăng Nhập</h2>
            
            <input type="text" id="ten_dang_nhap" class="nhap_thong_tin" placeholder="Tên đăng nhập"><br><br>
            <input type="password" id="mat_khau" class="nhap_thong_tin" placeholder="Mật khẩu"><br><br>
            
            <input type="password" id="xac_nhan_mat_khau" class="nhap_thong_tin" placeholder="Xác nhận mật khẩu" style="display: none;">
            <br id="br_xac_nhan" style="display: none;"><br id="br_xac_nhan_2" style="display: none;">
            
            <button id="nut_dang_nhap" class="submit-btn">Đăng Nhập Ngay</button>
            
            <p id="toggle-auth-text" style="margin-top: 15px; cursor: pointer; color: #fffa65; text-decoration: underline; font-size: 14px;">
                Chưa có tài khoản? Đăng ký ngay
            </p>
        </div>
    </div>
    </div>
    </div>
    
    <div id="menu-overlay" ></div>
    <nav id="rolexus-sidebar">
        <button id ="close-menu-btn"  >✖ Đóng</button><br>
        
        <ul class="menu-list">
            <button id="Product_list_btn" class="nut_menu_style">All sản phẩm</button><br>
            <div></div><br>
            <button id ="nam_btn" class="nut_menu_style nut_menu">Thời trang nam</button><br>
            <div></div><br>
            <button id="nu_btn" class="nut_menu_style nut_menu">Thời trang nữ</button><br>
            <hr style="border-color: #555; margin: 10px 0;"><br>

            <button id="the_loai_btn" class="nut_menu_style" style="width: 100%; text-align: left; display: flex; justify-content: space-between;">
                <span>🏷️ Thể loại</span> 
                <span id="the_loai_icon">▼</span>
            </button><br>

            <div id="sub_menu_the_loai" style="display: none; padding-left: 20px; margin-top: 5px;">
                <button id="nhan_btn" class="nut_menu_style nut_menu" style="margin-bottom: 15px;">💍 Nhẫn</button><br>
                <button id="vong_btn" class="nut_menu_style nut_menu" style="margin-bottom: 15px;">📿 Vòng & Dây chuyền</button><br>
                <button id="mu_btn" class="nut_menu_style nut_menu" style="margin-bottom: 15px;">🧢 Mũ</button><br>
                <button id="kinh_btn" class="nut_menu_style nut_menu" style="margin-bottom: 15px;">👓 Kính</button><br>
            </div>
            

            
        </ul>
    </nav>


       

<div id="product-list" class="container">
    
</div>
<div id="cart-modal" class="modal-overlay">
    <div class="modal-box" style="width: 400px; max-height: 80vh; overflow-y: auto;">
        <span id="close-cart-btn" class="close-btn">✖</span>
        <h2>Giỏ Hàng Của Bạn</h2>
        <div id="cart-items-container">
            </div>
        <div style="margin-top: 20px; text-align: right; border-top: 2px solid #fffa65; padding-top: 10px;">
            <h3>Tổng: <span id="cart-total-price">0</span> VND</h3>
        </div>
        <button id="checkout-btn" class="submit-btn" style="width: 100%; margin-top: 10px;">Thanh Toán</button>
    </div>
</div>
    <button id="myBtn" class="supercool_style"></button>
    <script src="kich_ban.js"></script>
    </body>
</html>
